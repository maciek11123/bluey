<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bluey Mirror</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; cursor: none; }

    #container {
      position: relative;
      width: 100vw; height: 100vh;
      overflow: hidden;
      transform: scaleX(-1);
    }
    #webcam {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #trackingCanvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 5; pointer-events: none;
    }
    #overlay {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }

    /* ─── Character ─── */
    #character {
      position: absolute;
      display: none;
      pointer-events: none;
      transform-origin: center bottom;
      transform: scaleX(-1);
      filter: drop-shadow(0 6px 14px rgba(0,0,0,0.45));
      will-change: transform, opacity, left, top;
    }

    @keyframes popIn {
      0%   { opacity: 0; transform: scaleX(-1) scale(0) translateY(30px); }
      55%  { opacity: 1; transform: scaleX(-1) scale(1.12) translateY(-8px); }
      75%  { transform: scaleX(-1) scale(0.96) translateY(3px); }
      100% { opacity: 1; transform: scaleX(-1) scale(1) translateY(0); }
    }
    @keyframes popOut {
      0%   { opacity: 1; transform: scaleX(-1) scale(1); }
      35%  { opacity: 1; transform: scaleX(-1) scale(1.08) translateY(-10px); }
      100% { opacity: 0; transform: scaleX(-1) scale(0) translateY(20px); }
    }
    @keyframes idleBob {
      0%, 100% { transform: scaleX(-1) translateY(0); }
      50%      { transform: scaleX(-1) translateY(-8px); }
    }
    @keyframes wave {
      0%   { transform: scaleX(-1) rotate(0deg); }
      15%  { transform: scaleX(-1) rotate(14deg); }
      30%  { transform: scaleX(-1) rotate(-12deg); }
      45%  { transform: scaleX(-1) rotate(10deg); }
      60%  { transform: scaleX(-1) rotate(-8deg); }
      75%  { transform: scaleX(-1) rotate(5deg); }
      100% { transform: scaleX(-1) rotate(0deg); }
    }

    #character.entering {
      display: block;
      animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    #character.waving {
      display: block; opacity: 1;
      animation: wave 0.8s ease-in-out 2; /* wave twice */
    }
    #character.idle {
      display: block; opacity: 1;
      animation: idleBob 2.5s ease-in-out infinite;
    }
    #character.exiting {
      display: block;
      animation: popOut 0.45s ease-in forwards;
    }

    /* ─── Splash ─── */
    #status {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; background: rgba(0,0,0,0.85);
      transition: opacity 1.5s ease;
    }
    #status.hidden { opacity: 0; pointer-events: none; }
    #status-inner { text-align: center; color: #fff; font-family: -apple-system, 'Segoe UI', sans-serif; }
    #status-inner h1 {
      font-size: 48px; font-weight: 700; margin-bottom: 16px;
      background: linear-gradient(135deg, #5BC0EB, #FDE74C, #FF6B6B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #status-inner p { font-size: 20px; color: rgba(255,255,255,0.7); }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid rgba(255,255,255,0.2); border-top-color: #5BC0EB;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #hint {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.85);
      font: 600 24px -apple-system, 'Segoe UI', sans-serif;
      z-index: 100; text-shadow: 0 2px 10px rgba(0,0,0,0.7);
      opacity: 0; transition: opacity 1s ease; pointer-events: none;
    }
    #hint.show { opacity: 1; }

    #debug {
      display: none; position: fixed; top: 10px; left: 10px;
      color: #0f0; font: 14px/1.6 monospace;
      background: rgba(0,0,0,0.8); padding: 12px 16px;
      border-radius: 8px; z-index: 2000; white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div id="status">
    <div id="status-inner">
      <h1>Bluey Mirror</h1>
      <p><span class="spinner"></span><span id="status-msg">Loading…</span></p>
    </div>
  </div>
  <div id="hint">👋 Wave to say hi!</div>

  <div id="container">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="trackingCanvas"></canvas>
    <div id="overlay">
      <img id="character" alt="" />
    </div>
  </div>

  <div id="debug"></div>

  <script type="module">
    // ─── CONFIG ─────────────────────────────────────────
    const CHARACTERS = [
      { src: "bluey_dancing_1.gif", name: "Bluey" },
      { src: "bingo_dance_1.gif",   name: "Bingo" },
      { src: "bluey_1.gif",         name: "Bluey" },
      { src: "bluey_bingo_dance_1.gif", name: "Both" },
      { src: "bluey_bong_happy.gif",    name: "Both" },
      { src: "bluey_bingo_surprised.gif", name: "Both" },
    ];

    const CFG = {
      smoothing: 0.5,
      trackThreshold: 0.25,
      ghostFrames: 20,

      // Wave: hand above shoulder + oscillation OR hold above head
      waveHandThresh: 0.04,   // wrist above shoulder (normalized)
      waveChanges: 2,          // direction flips needed
      waveWindowMs: 2500,      // generous window
      waveCooldownMs: 2500,

      holdThresh: 0.05,        // wrist above nose
      holdMs: 800,             // hold for 0.8s

      // Character timing
      charVisibleMs: 7000,     // how long character stays
      globalCooldownMs: 3000,  // min time between ANY character spawns
    };

    // ─── ELEMENTS ───────────────────────────────────────
    const video   = document.getElementById("webcam");
    const overlay = document.getElementById("overlay");
    const charEl  = document.getElementById("character");
    const tCanvas = document.getElementById("trackingCanvas");
    const tCtx    = tCanvas.getContext("2d");
    const statusEl  = document.getElementById("status");
    const statusMsg = document.getElementById("status-msg");
    const hintEl    = document.getElementById("hint");
    const debugEl   = document.getElementById("debug");

    // ─── STATE ──────────────────────────────────────────
    let people = [];
    let lastVideoTime = -1;
    let fps = 0, frameCt = 0, fpsT = performance.now();
    let showDebug = false;

    // Character state
    let charActive = false;      // is a character currently on screen?
    let lastCharTime = 0;        // when the last character was spawned
    let lastCharIdx = -1;        // avoid same character twice in a row
    let followTarget = null;     // which person the character follows

    // ─── COORD MAPPING ─────────────────────────────────
    function getMapping() {
      const cw = overlay.clientWidth, ch = overlay.clientHeight;
      const vw = video.videoWidth || 640, vh = video.videoHeight || 480;
      const cA = cw / ch, vA = vw / vh;
      let s, ox, oy;
      if (vA > cA) { s = ch / vh; ox = (vw * s - cw) / 2; oy = 0; }
      else         { s = cw / vw; ox = 0; oy = (vh * s - ch) / 2; }
      return { s, ox, oy, vw, vh, cw, ch };
    }
    function lm2px(lm, m) {
      return { x: lm.x * m.vw * m.s - m.ox, y: lm.y * m.vh * m.s - m.oy };
    }

    // ─── WAVE DETECTION ─────────────────────────────────
    function detectWave(pose, p, now) {
      if (now - p.lastWaveTrigger < CFG.waveCooldownMs) return false;

      const lW = pose[15], rW = pose[16];
      const lS = pose[11], rS = pose[12];
      const nose = pose[0];
      if (!lW || !rW || !lS || !rS) return false;

      // Pick higher hand
      let wrist, shoulder;
      if (lW.y < rW.y) { wrist = lW; shoulder = lS; }
      else              { wrist = rW; shoulder = rS; }

      const handUp = (shoulder.y - wrist.y) > CFG.waveHandThresh;

      // ── Hold above head trigger ──
      if (nose && (nose.y - wrist.y) > CFG.holdThresh) {
        if (!p.holdStart) p.holdStart = now;
        p.holdProgress = Math.min((now - p.holdStart) / CFG.holdMs, 1);
        if (p.holdProgress >= 1) {
          p.holdStart = null; p.holdProgress = 0;
          p.waveHist = [];
          p.lastWaveTrigger = now;
          return true;
        }
      } else {
        p.holdStart = null; p.holdProgress = 0;
      }

      // ── Oscillation trigger ──
      if (!handUp) {
        if (p.waveHist.length > 0) {
          const age = now - p.waveHist[p.waveHist.length - 1].t;
          if (age > 600) p.waveHist = [];
        }
        p.handUp = false;
        return false;
      }

      p.handUp = true;
      p.waveHist.push({ x: wrist.x, t: now });
      p.waveHist = p.waveHist.filter(e => now - e.t < CFG.waveWindowMs);

      if (p.waveHist.length < 4) return false;

      let changes = 0, prev = 0;
      for (let i = 1; i < p.waveHist.length; i++) {
        const dx = p.waveHist[i].x - p.waveHist[i - 1].x;
        const d = dx > 0.002 ? 1 : dx < -0.002 ? -1 : 0;
        if (d !== 0 && d !== prev) { if (prev !== 0) changes++; prev = d; }
      }

      p.waveProgress = Math.min(changes / CFG.waveChanges, 1);

      if (changes >= CFG.waveChanges) {
        p.waveHist = [];
        p.lastWaveTrigger = now;
        p.waveProgress = 0;
        return true;
      }
      return false;
    }

    // ─── SPAWN CHARACTER ────────────────────────────────
    function spawnCharacter(person, mapping, now) {
      if (charActive) return;
      if (now - lastCharTime < CFG.globalCooldownMs) return;

      charActive = true;
      lastCharTime = now;
      followTarget = person;

      // Pick character (avoid same as last time)
      let idx;
      do { idx = Math.floor(Math.random() * CHARACTERS.length); }
      while (idx === lastCharIdx && CHARACTERS.length > 1);
      lastCharIdx = idx;

      charEl.src = CHARACTERS[idx].src;
      positionCharacter(person, mapping);

      // Entrance → wave → idle → exit
      charEl.className = "entering";
      setTimeout(() => {
        if (!charActive) return;
        charEl.className = "waving";
        setTimeout(() => {
          if (!charActive) return;
          charEl.className = "idle";
          // Schedule exit
          setTimeout(() => {
            charEl.className = "exiting";
            setTimeout(() => {
              charEl.className = "";
              charEl.style.display = "none";
              charActive = false;
              followTarget = null;
            }, 450);
          }, CFG.charVisibleMs - 2200);
        }, 1600); // wave animation duration (0.8s × 2)
      }, 500); // entrance duration
    }

    function positionCharacter(person, mapping) {
      // Size: roughly match person's full body height
      const fullHeight = person.torsoH * 2.8;
      const charH = Math.max(fullHeight, 100);
      const charW = charH * 0.75;

      // Side: push toward center of frame
      const dir = person.px < mapping.cw / 2 ? 1 : -1;
      const offset = person.shoulderW * 1.2 * dir;

      const x = person.px + offset - charW / 2;
      const y = person.footY - charH;

      charEl.style.left   = x + "px";
      charEl.style.top    = y + "px";
      charEl.style.width  = charW + "px";
      charEl.style.height = "auto";
    }

    // ─── TRACKING INDICATORS ────────────────────────────
    function drawIndicators(mapping, now) {
      tCanvas.width = mapping.cw;
      tCanvas.height = mapping.ch;
      tCtx.clearRect(0, 0, mapping.cw, mapping.ch);

      const colors = ["#5BC0EB", "#FF6B6B", "#FDE74C", "#9B5DE5"];

      for (const p of people) {
        const col = colors[p.ci] || "#fff";
        const cx = p.px;
        const cy = p.footY - p.torsoH;

        // Tracking dot
        tCtx.beginPath();
        tCtx.arc(cx, cy, 6, 0, Math.PI * 2);
        tCtx.fillStyle = col;
        tCtx.globalAlpha = 0.45;
        tCtx.fill();
        tCtx.globalAlpha = 1;

        // Wave progress ring (only if hand is up and no character active)
        if (p.handUp && !charActive) {
          // Outer ring
          tCtx.beginPath();
          tCtx.arc(cx, cy - p.torsoH * 0.6, 18, 0, Math.PI * 2);
          tCtx.strokeStyle = col;
          tCtx.lineWidth = 2;
          tCtx.globalAlpha = 0.4;
          tCtx.stroke();
          tCtx.globalAlpha = 1;

          // Fill ring based on progress
          const prog = p.waveProgress || 0;
          if (prog > 0) {
            tCtx.beginPath();
            tCtx.arc(cx, cy - p.torsoH * 0.6, 18,
              -Math.PI / 2, -Math.PI / 2 + prog * Math.PI * 2);
            tCtx.strokeStyle = col;
            tCtx.lineWidth = 4;
            tCtx.stroke();
          }

          // Hold progress (white ring)
          if (p.holdProgress > 0) {
            tCtx.beginPath();
            tCtx.arc(cx, cy - p.torsoH * 0.6, 24,
              -Math.PI / 2, -Math.PI / 2 + p.holdProgress * Math.PI * 2);
            tCtx.strokeStyle = "#fff";
            tCtx.lineWidth = 3;
            tCtx.stroke();
          }
        }
      }
    }

    // ─── NEW PERSON ─────────────────────────────────────
    function newPerson(det, ci) {
      return {
        nx: det.nx, ny: det.ny,
        px: det.px, footY: det.footY,
        torsoH: det.torsoH, shoulderW: det.shoulderW,
        ci, ghost: 0,
        waveHist: [], lastWaveTrigger: 0,
        holdStart: null, holdProgress: 0,
        handUp: false, waveProgress: 0,
      };
    }

    // ─── MAIN ───────────────────────────────────────────
    async function init() {
      try {
        statusMsg.textContent = "Loading pose detection…";

        const { PoseLandmarker, FilesetResolver } = await import(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs"
        );
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm"
        );
        const poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath:
              "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
            delegate: "GPU",
          },
          runningMode: "VIDEO",
          numPoses: 4,
        });

        statusMsg.textContent = "Starting camera…";
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
        });
        video.srcObject = stream;
        await new Promise(r => video.addEventListener("loadeddata", r, { once: true }));

        statusEl.classList.add("hidden");
        setTimeout(() => statusEl.remove(), 2000);
        setTimeout(() => hintEl.classList.add("show"), 2500);
        setTimeout(() => hintEl.classList.remove("show"), 10000);

        // ─── LOOP ───────────────────────────────────────
        function loop() {
          const now = performance.now();
          frameCt++;
          if (now - fpsT > 1000) { fps = frameCt; frameCt = 0; fpsT = now; }

          if (video.currentTime !== lastVideoTime) {
            lastVideoTime = video.currentTime;
            const results = poseLandmarker.detectForVideo(video, now);
            const mp = getMapping();

            // ── Extract ──
            const dets = [], rawPoses = [];
            if (results.landmarks) {
              for (const pose of results.landmarks) {
                const lS = pose[11], rS = pose[12], lH = pose[23], rH = pose[24];
                const lA = pose[27], rA = pose[28];
                if (!lS || !rS || !lH || !rH) continue;

                const cx = (lH.x + rH.x) / 2, cy = (lH.y + rH.y) / 2;
                const sMid = lm2px({ x: (lS.x + rS.x) / 2, y: (lS.y + rS.y) / 2 }, mp);
                const hMid = lm2px({ x: cx, y: cy }, mp);
                const torsoH = Math.abs(hMid.y - sMid.y);
                const sw = Math.abs(lm2px(lS, mp).x - lm2px(rS, mp).x);
                let footY = hMid.y + torsoH * 0.9;
                if (lA && rA) footY = Math.max(lm2px(lA, mp).y, lm2px(rA, mp).y);

                dets.push({ nx: cx, ny: cy, px: hMid.x, footY, torsoH, shoulderW: sw });
                rawPoses.push(pose);
              }
            }

            // ── Match ──
            const used = new Set(), surv = [];
            for (const p of people) {
              let bD = Infinity, bI = -1;
              for (let i = 0; i < dets.length; i++) {
                if (used.has(i)) continue;
                const d = Math.hypot(dets[i].nx - p.nx, dets[i].ny - p.ny);
                if (d < bD && d < CFG.trackThreshold) { bD = d; bI = i; }
              }
              if (bI >= 0) {
                used.add(bI);
                const det = dets[bI], s = CFG.smoothing;
                surv.push({
                  ...p,
                  nx: det.nx, ny: det.ny,
                  px: p.px * s + det.px * (1 - s),
                  footY: p.footY * s + det.footY * (1 - s),
                  torsoH: p.torsoH * s + det.torsoH * (1 - s),
                  shoulderW: p.shoulderW * s + det.shoulderW * (1 - s),
                  ghost: 0, _pi: bI,
                });
              } else if (p.ghost < CFG.ghostFrames) {
                surv.push({ ...p, ghost: p.ghost + 1, _pi: -1 });
              }
            }

            // ── New ──
            const usedC = new Set(surv.map(p => p.ci));
            for (let i = 0; i < dets.length; i++) {
              if (used.has(i)) continue;
              let fc = -1;
              for (let c = 0; c < 4; c++) { if (!usedC.has(c)) { fc = c; break; } }
              if (fc < 0) break;
              usedC.add(fc);
              const p = newPerson(dets[i], fc);
              p._pi = i;
              surv.push(p);
            }

            // ── Gestures ──
            for (const p of surv) {
              if (p._pi >= 0 && rawPoses[p._pi]) {
                if (detectWave(rawPoses[p._pi], p, now)) {
                  spawnCharacter(p, mp, now);
                }
              }
            }

            // ── Follow target with character ──
            if (charActive && followTarget) {
              const match = surv.find(p => p.ci === followTarget.ci);
              if (match) {
                followTarget = match;
                positionCharacter(match, mp);
              }
            }

            people = surv;
            drawIndicators(mp, now);

            // ── Debug ──
            if (showDebug) {
              debugEl.innerHTML =
                `FPS: ${fps}\n` +
                `Poses: ${results.landmarks ? results.landmarks.length : 0}\n` +
                `Tracked: ${people.length}\n` +
                `Char active: ${charActive}\n` +
                `Video: ${video.videoWidth}x${video.videoHeight}\n\n` +
                people.map(p =>
                  `[${p.ci}] pos=(${p.px.toFixed(0)},${p.footY.toFixed(0)}) ` +
                  `torso=${p.torsoH.toFixed(0)} hand=${p.handUp} ` +
                  `waveProg=${(p.waveProgress || 0).toFixed(1)} ` +
                  `holdProg=${(p.holdProgress || 0).toFixed(1)} ` +
                  `ghost=${p.ghost}`
                ).join("\n");
            }
          }
          requestAnimationFrame(loop);
        }
        loop();

      } catch (err) {
        statusMsg.textContent = "Error: " + err.message;
        console.error(err);
      }
    }

    // ─── CONTROLS ───────────────────────────────────────
    document.addEventListener("keydown", e => {
      if (e.key === "d" || e.key === "D") {
        showDebug = !showDebug;
        debugEl.style.display = showDebug ? "block" : "none";
      }
      if (e.key === "f" || e.key === "F") document.documentElement.requestFullscreen?.();
    });
    document.body.addEventListener("click", () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    });

    init();
  </script>
</body>
</html>
