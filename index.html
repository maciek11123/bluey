<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluey Mirror</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;width:100vw;height:100vh;cursor:none}
  #container{position:relative;width:100vw;height:100vh;overflow:hidden;transform:scaleX(-1)}
  #webcam{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover}
  #trackingCanvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;pointer-events:none}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
  #character{position:absolute;display:none;pointer-events:none;transform-origin:center bottom;transform:scaleX(-1);filter:drop-shadow(0 6px 14px rgba(0,0,0,0.45));will-change:transform,opacity,left,top}
  @keyframes popIn{0%{opacity:0;transform:scaleX(-1) scale(0) translateY(30px)}55%{opacity:1;transform:scaleX(-1) scale(1.12) translateY(-8px)}75%{transform:scaleX(-1) scale(0.96) translateY(3px)}100%{opacity:1;transform:scaleX(-1) scale(1) translateY(0)}}
  @keyframes popOut{0%{opacity:1;transform:scaleX(-1) scale(1)}35%{opacity:1;transform:scaleX(-1) scale(1.08) translateY(-10px)}100%{opacity:0;transform:scaleX(-1) scale(0) translateY(20px)}}
  #character.entering{display:block;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards}
  #character.visible{display:block;opacity:1;transform:scaleX(-1)}
  #character.exiting{display:block;animation:popOut .45s ease-in forwards}
  #status{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:1000;background:rgba(0,0,0,.85);transition:opacity 1.5s ease}
  #status.hidden{opacity:0;pointer-events:none}
  #status-inner{text-align:center;color:#fff;font-family:-apple-system,'Segoe UI',sans-serif}
  #status-inner h1{font-size:48px;font-weight:700;margin-bottom:16px;background:linear-gradient(135deg,#5BC0EB,#FDE74C,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #status-inner p{font-size:20px;color:rgba(255,255,255,.7)}
  .spinner{display:inline-block;width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:#5BC0EB;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:10px}
  @keyframes spin{to{transform:rotate(360deg)}}
  #hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.85);font:600 24px -apple-system,'Segoe UI',sans-serif;z-index:100;text-shadow:0 2px 10px rgba(0,0,0,.7);opacity:0;transition:opacity 1s ease;pointer-events:none}
  #hint.show{opacity:1}
  #debug{display:none;position:fixed;top:10px;left:10px;color:#0f0;font:14px/1.6 monospace;background:rgba(0,0,0,.8);padding:12px 16px;border-radius:8px;z-index:2000;white-space:pre-wrap}
</style>
</head>
<body>
<div id="status"><div id="status-inner"><h1>Bluey Mirror</h1><p><span class="spinner"></span><span id="status-msg">Loading…</span></p></div></div>
<div id="hint">👋 Wave to say hi!</div>
<div id="container">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="trackingCanvas"></canvas>
  <div id="overlay"><img id="character" alt=""/></div>
</div>
<div id="debug"></div>

<!-- TensorFlow.js + COCO-SSD (YOLO-style) + MoveNet (pose) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
const GIFS = [
  { src: "bingo_waving.gif",     desc: "Bingo waving hello",          activity: ["waving"] },
  { src: "bingo_shy.gif",        desc: "Bingo looking shy",           activity: ["idle"] },
  { src: "bingo_surprised.gif",  desc: "Bingo surprised",             activity: ["jumping","armsup"] },
  { src: "bluey_standing.gif",   desc: "Bluey standing, smiling",     activity: ["idle","waving"] },
  { src: "chilli_dancing.gif",   desc: "Chilli dancing",              activity: ["dancing"] },
  { src: "chilli_bird.gif",      desc: "Chilli bird flapping",        activity: ["dancing","armsup"] },
  { src: "jack_guitar.gif",      desc: "Jack Russell with guitar",    activity: ["dancing","waving"] },
  { src: "baby_bingo_diaper.png", desc: "Baby Bingo in diaper, dancing", activity: ["dancing","idle"] },
];

const CFG = {
  smoothing: 0.5,
  trackThresh: 0.3,
  ghostFrames: 20,
  // Wave
  waveHandThresh: 30,    // pixels above shoulder
  waveChanges: 2,
  waveWindowMs: 2500,
  waveCooldownMs: 2500,
  holdThresh: 40,         // pixels above nose
  holdMs: 800,
  // Character
  charVisibleMs: 7000,
  globalCooldownMs: 3000,
  // YOLO fallback spawn
  yoloSpawnIntervalMs: 8000,
};

const video = document.getElementById("webcam");
const overlay = document.getElementById("overlay");
const charEl = document.getElementById("character");
const tCanvas = document.getElementById("trackingCanvas");
const tCtx = tCanvas.getContext("2d");
const statusEl = document.getElementById("status");
const statusMsg = document.getElementById("status-msg");
const hintEl = document.getElementById("hint");
const debugEl = document.getElementById("debug");

let people = [];
let fps = 0, frameCt = 0, fpsT = performance.now();
let showDebug = false;
let charActive = false, lastCharTime = 0, lastGifIdx = -1;
let cocoModel = null, poseDetector = null;
let lastYoloSpawn = 0;

// ─── COVER MAPPING ──────────────────────────────────
function getMap() {
  const cw = overlay.clientWidth, ch = overlay.clientHeight;
  const vw = video.videoWidth || 640, vh = video.videoHeight || 480;
  const cA = cw/ch, vA = vw/vh;
  let s, ox, oy;
  if (vA > cA) { s = ch/vh; ox = (vw*s - cw)/2; oy = 0; }
  else { s = cw/vw; ox = 0; oy = (vh*s - ch)/2; }
  return { s, ox, oy, vw, vh, cw, ch };
}
function v2px(x, y, m) {
  return { x: x * m.s - m.ox, y: y * m.s - m.oy };
}

// ─── PERSON STATE ───────────────────────────────────
function newPerson(det, ci) {
  return {
    ...det, ci, ghost: 0, source: det.source,
    waveHist: [], lastWaveTrigger: 0,
    holdStart: null, holdProgress: 0,
    handUp: false, waveProgress: 0,
    posHistory: [], hipYHistory: [],
    activity: "idle", velocity: 0,
  };
}

// ─── WAVE DETECTION (pixel coords) ──────────────────
function detectWave(kps, p, now) {
  if (now - p.lastWaveTrigger < CFG.waveCooldownMs) return false;

  const lW = kps[9], rW = kps[10]; // wrists
  const lS = kps[5], rS = kps[6];  // shoulders
  const nose = kps[0];

  if (!lW || !rW || !lS || !rS || lW.score < 0.3 || rW.score < 0.3) return false;

  let wrist, shoulder;
  if (lW.y < rW.y) { wrist = lW; shoulder = lS; }
  else { wrist = rW; shoulder = rS; }

  // Hold above head
  if (nose && nose.score > 0.3 && (nose.y - wrist.y) > CFG.holdThresh) {
    if (!p.holdStart) p.holdStart = now;
    p.holdProgress = Math.min((now - p.holdStart) / CFG.holdMs, 1);
    if (p.holdProgress >= 1) {
      p.holdStart = null; p.holdProgress = 0;
      p.waveHist = []; p.lastWaveTrigger = now; return true;
    }
  } else { p.holdStart = null; p.holdProgress = 0; }

  // Oscillation
  const handUp = (shoulder.y - wrist.y) > CFG.waveHandThresh;
  if (!handUp) {
    if (p.waveHist.length > 0 && now - p.waveHist[p.waveHist.length-1].t > 600) p.waveHist = [];
    p.handUp = false; return false;
  }
  p.handUp = true;
  p.waveHist.push({ x: wrist.x, t: now });
  p.waveHist = p.waveHist.filter(e => now - e.t < CFG.waveWindowMs);
  if (p.waveHist.length < 4) return false;

  let changes = 0, prev = 0;
  for (let i = 1; i < p.waveHist.length; i++) {
    const dx = p.waveHist[i].x - p.waveHist[i-1].x;
    const d = dx > 2 ? 1 : dx < -2 ? -1 : 0;
    if (d !== 0 && d !== prev) { if (prev !== 0) changes++; prev = d; }
  }
  p.waveProgress = Math.min(changes / CFG.waveChanges, 1);
  if (changes >= CFG.waveChanges) {
    p.waveHist = []; p.lastWaveTrigger = now; p.waveProgress = 0; return true;
  }
  return false;
}

// ─── PICK GIF ───────────────────────────────────────
function pickGif() {
  let idx;
  do { idx = Math.floor(Math.random() * GIFS.length); }
  while (idx === lastGifIdx && GIFS.length > 1);
  lastGifIdx = idx;
  return GIFS[idx];
}

// ─── SPAWN CHARACTER ────────────────────────────────
function spawnCharacter(person, mp, now) {
  if (charActive || now - lastCharTime < CFG.globalCooldownMs) return;
  charActive = true; lastCharTime = now;

  const gif = pickGif();
  charEl.src = gif.src + "?t=" + Date.now();

  // 40% screen height
  const charH = mp.ch * 0.40;
  const cx = person.px, cy = person.py;
  const dir = cx < mp.cw/2 ? 1 : -1;
  const offset = (person.width || 80) * 0.6 * dir;
  let x = cx + offset - charH * 0.4;
  let y = cy - charH * 0.5;
  x = Math.max(0, Math.min(x, mp.cw - charH * 0.8));
  y = Math.max(0, Math.min(y, mp.ch - charH));

  charEl.style.left = x + "px";
  charEl.style.top = y + "px";
  charEl.style.height = charH + "px";
  charEl.style.width = "auto";
  charEl.style.display = "";
  charEl.className = "entering";

  setTimeout(() => {
    if (!charActive) return;
    charEl.className = "visible";
    setTimeout(() => {
      if (!charActive) return;
      charEl.className = "exiting";
      setTimeout(() => {
        charEl.className = ""; charEl.style.display = "none";
        charActive = false;
      }, 450);
    }, CFG.charVisibleMs);
  }, 500);
}

// ─── DRAW INDICATORS ────────────────────────────────
function drawIndicators(mp) {
  tCanvas.width = mp.cw; tCanvas.height = mp.ch;
  tCtx.clearRect(0, 0, mp.cw, mp.ch);
  const cols = ["#5BC0EB","#FF6B6B","#FDE74C","#9B5DE5","#00FF78","#FF69B4"];

  for (const p of people) {
    const c = cols[p.ci % cols.length];

    // Bounding box
    if (p.bx !== undefined) {
      tCtx.strokeStyle = c; tCtx.lineWidth = 2; tCtx.globalAlpha = 0.3;
      tCtx.strokeRect(p.bx, p.by, p.bw, p.bh);
      tCtx.globalAlpha = 1;
    }

    // Center dot
    tCtx.beginPath();
    tCtx.arc(p.px, p.py, 6, 0, Math.PI*2);
    tCtx.fillStyle = p.source === "pose" ? c : "#888";
    tCtx.globalAlpha = 0.5; tCtx.fill(); tCtx.globalAlpha = 1;

    // Source label
    tCtx.font = "10px sans-serif"; tCtx.fillStyle = c;
    tCtx.fillText(p.source === "pose" ? "POSE" : "YOLO", p.px - 12, p.py - 12);

    // Wave progress
    if (p.handUp && !charActive) {
      tCtx.beginPath();
      tCtx.arc(p.px, p.py - 30, 16, 0, Math.PI*2);
      tCtx.strokeStyle = c; tCtx.lineWidth = 2; tCtx.globalAlpha = 0.4; tCtx.stroke(); tCtx.globalAlpha = 1;
      if (p.waveProgress > 0) {
        tCtx.beginPath();
        tCtx.arc(p.px, p.py - 30, 16, -Math.PI/2, -Math.PI/2 + p.waveProgress * Math.PI*2);
        tCtx.strokeStyle = c; tCtx.lineWidth = 4; tCtx.stroke();
      }
      if (p.holdProgress > 0) {
        tCtx.beginPath();
        tCtx.arc(p.px, p.py - 30, 22, -Math.PI/2, -Math.PI/2 + p.holdProgress * Math.PI*2);
        tCtx.strokeStyle = "#fff"; tCtx.lineWidth = 3; tCtx.stroke();
      }
    }

    // Skeleton lines (if pose keypoints available)
    if (p.keypoints) {
      const kps = p.keypoints;
      tCtx.strokeStyle = c; tCtx.lineWidth = 1.5; tCtx.globalAlpha = 0.25;
      const bones = [[5,6],[5,7],[7,9],[6,8],[8,10],[5,11],[6,12],[11,12],[11,13],[13,15],[12,14],[14,16]];
      for (const [a,b] of bones) {
        if (kps[a] && kps[b] && kps[a].score > 0.2 && kps[b].score > 0.2) {
          tCtx.beginPath();
          tCtx.moveTo(kps[a].px, kps[a].py);
          tCtx.lineTo(kps[b].px, kps[b].py);
          tCtx.stroke();
        }
      }
      tCtx.globalAlpha = 1;
    }
  }
}

// ─── INIT ───────────────────────────────────────────
async function init() {
  try {
    statusMsg.textContent = "Loading TensorFlow.js…";
    await tf.setBackend('webgl');
    await tf.ready();

    statusMsg.textContent = "Loading YOLO (COCO-SSD)…";
    cocoModel = await cocoSsd.load({ base: 'mobilenet_v2' });

    statusMsg.textContent = "Loading MoveNet MultiPose…";
    poseDetector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.MULTIPOSE_LIGHTNING, enableSmoothing: true }
    );

    statusMsg.textContent = "Starting camera…";
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } }
    });
    video.srcObject = stream;
    await new Promise(r => video.addEventListener("loadeddata", r, { once: true }));

    statusEl.classList.add("hidden");
    setTimeout(() => statusEl.remove(), 2000);
    setTimeout(() => hintEl.classList.add("show"), 2500);
    setTimeout(() => hintEl.classList.remove("show"), 10000);

    loop();
  } catch (err) {
    statusMsg.textContent = "Error: " + err.message;
    console.error(err);
  }
}

// ─── MAIN LOOP ──────────────────────────────────────
async function loop() {
  const now = performance.now();
  frameCt++;
  if (now - fpsT > 1000) { fps = frameCt; frameCt = 0; fpsT = now; }

  const mp = getMap();

  // ── YOLO: detect all people (bounding boxes) ──
  let yoloDetections = [];
  try {
    const predictions = await cocoModel.detect(video);
    yoloDetections = predictions
      .filter(p => p.class === "person" && p.score > 0.4)
      .slice(0, 6)
      .map(p => {
        const [bx, by, bw, bh] = p.bbox;
        const center = v2px(bx + bw/2, by + bh/2, mp);
        const tl = v2px(bx, by, mp);
        const sz = { w: bw * mp.s, h: bh * mp.s };
        return { px: center.x, py: center.y, bx: tl.x, by: tl.y, bw: sz.w, bh: sz.h, width: sz.w, score: p.score, source: "yolo" };
      });
  } catch(e) {}

  // ── MoveNet: multi-person pose ──
  let poseDetections = [];
  try {
    const poses = await poseDetector.estimatePoses(video);
    poseDetections = poses
      .filter(p => p.score > 0.2)
      .slice(0, 6)
      .map(p => {
        // Map keypoints to display coords
        const mapped = p.keypoints.map(kp => {
          const dp = v2px(kp.x, kp.y, mp);
          return { ...kp, px: dp.x, py: dp.y };
        });
        // Center from hips or shoulders
        const lH = mapped[11], rH = mapped[12], lS = mapped[5], rS = mapped[6];
        let cx, cy;
        if (lH.score > 0.2 && rH.score > 0.2) {
          cx = (lH.px + rH.px)/2; cy = (lH.py + rH.py)/2;
        } else if (lS.score > 0.2 && rS.score > 0.2) {
          cx = (lS.px + rS.px)/2; cy = (lS.py + rS.py)/2;
        } else {
          const valid = mapped.filter(k => k.score > 0.2);
          if (valid.length === 0) return null;
          cx = valid.reduce((s,k) => s + k.px, 0) / valid.length;
          cy = valid.reduce((s,k) => s + k.py, 0) / valid.length;
        }
        const sw = lS.score > 0.2 && rS.score > 0.2 ? Math.abs(lS.px - rS.px) : 60;
        return { px: cx, py: cy, width: sw, keypoints: mapped, score: p.score, source: "pose" };
      })
      .filter(Boolean);
  } catch(e) {}

  // ── Merge: prefer pose, fill with YOLO ──
  const merged = [...poseDetections];
  for (const yd of yoloDetections) {
    const overlap = merged.some(pd => Math.hypot(pd.px - yd.px, pd.py - yd.py) < 100);
    if (!overlap) merged.push(yd);
  }

  // ── Track ──
  const used = new Set(), surv = [];
  for (const p of people) {
    let bD = Infinity, bI = -1;
    for (let i = 0; i < merged.length; i++) {
      if (used.has(i)) continue;
      const d = Math.hypot(merged[i].px - p.px, merged[i].py - p.py);
      if (d < bD && d < 200) { bD = d; bI = i; }
    }
    if (bI >= 0) {
      used.add(bI);
      const det = merged[bI], s = CFG.smoothing;
      surv.push({ ...p,
        px: p.px*s + det.px*(1-s), py: p.py*s + det.py*(1-s),
        width: p.width*s + (det.width||p.width)*(1-s),
        bx: det.bx, by: det.by, bw: det.bw, bh: det.bh,
        keypoints: det.keypoints || p.keypoints,
        source: det.source, ghost: 0,
      });
    } else if (p.ghost < CFG.ghostFrames) {
      surv.push({ ...p, ghost: p.ghost+1 });
    }
  }
  const usedC = new Set(surv.map(p => p.ci));
  for (let i = 0; i < merged.length; i++) {
    if (used.has(i)) continue;
    let fc = -1;
    for (let c = 0; c < 6; c++) { if (!usedC.has(c)) { fc = c; break; } }
    if (fc < 0) break;
    usedC.add(fc);
    surv.push(newPerson(merged[i], fc));
  }

  // ── Gestures (pose people only) ──
  for (const p of surv) {
    if (p.keypoints && p.source === "pose") {
      if (detectWave(p.keypoints, p, now)) {
        spawnCharacter(p, mp, now);
      }
    }
  }

  // ── YOLO fallback: auto-spawn near YOLO-only people ──
  if (!charActive && surv.length > 0 && now - lastYoloSpawn > CFG.yoloSpawnIntervalMs) {
    const yoloOnly = surv.filter(p => p.source === "yolo");
    if (yoloOnly.length > 0) {
      const pick = yoloOnly[Math.floor(Math.random() * yoloOnly.length)];
      spawnCharacter(pick, mp, now);
      lastYoloSpawn = now;
    }
  }

  people = surv;
  drawIndicators(mp);

  if (showDebug) {
    debugEl.innerHTML =
      `FPS: ${fps}\nYOLO: ${yoloDetections.length}  MoveNet: ${poseDetections.length}  Tracked: ${people.length}\n` +
      `Char: ${charActive ? 'ACTIVE' : 'ready'}\n\n` +
      people.map(p =>
        `[${p.ci}] ${p.source.toUpperCase()} pos=(${p.px.toFixed(0)},${p.py.toFixed(0)}) ` +
        `hand=${p.handUp||false} wave=${(p.waveProgress||0).toFixed(1)} ghost=${p.ghost}`
      ).join("\n");
  }

  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => {
  if (e.key==="d"||e.key==="D") { showDebug=!showDebug; debugEl.style.display=showDebug?"block":"none"; }
  if (e.key==="f"||e.key==="F") document.documentElement.requestFullscreen?.();
});
document.body.addEventListener("click", () => {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
});

init();
</script>
</body>
</html>
